<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Carte 3D</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .perspective {
      perspective: 1000px;
    }

    .card-3d {
      width: 350px;
      height: 220px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.8s ease;
      cursor: pointer;
    }

    .card-3d.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 1rem;
      backface-visibility: hidden;
    }

    .card-front {
      background: linear-gradient(135deg, #cfcfcf, #8f8f8f);
      background-blend-mode: overlay;
      box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.4),
                  inset 0 0 30px rgba(0, 0, 0, 0.2),
                  0 4px 20px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      padding: 1.5rem;
    }

    .card-back {
      background-color: #1f2937; /* gray-800 */
      transform: rotateY(180deg);
      padding: 1.5rem;
      color: white;
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-black text-white">

  <div class="perspective">
    <div class="card-3d" id="card3d">
      <!-- Face avant -->
      <div class="card-face card-front">
        <h2 class="text-xl font-bold">John Doe</h2>
        <p class="text-sm">Email : john@example.com</p>
        <p class="text-sm mt-2">🏆 Victoires : 12</p>
        <p class="text-sm">❌ Défaites : 5</p>
      </div>

      <!-- Face arrière -->
      <div class="card-face card-back">
        <p><strong>Prénom :</strong> John</p>
        <p><strong>Nom :</strong> Doe</p>
        <p><strong>Créé le :</strong> 23 juin 2025</p>
        <p><strong>Dernière connexion :</strong> Aujourd'hui</p>
        <p><strong>Username :</strong> jdoe</p>
      </div>
    </div>
  </div>

  <script>
    const card = document.getElementById('card3d');
    card.addEventListener('click', () => {
      card.classList.toggle('flipped');
    });
  </script>
</body>
</html>
